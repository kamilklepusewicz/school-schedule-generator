services:
  # --- 1. BAZA DANYCH ---
  db:
    image: postgres:15-alpine
    container_name: school_schedule_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      
  # --- 2. BACKEND (FASTAPI) ---
  api:
    build: 
      context: ./backend
    container_name: school_schedule_api
    restart: always
    working_dir: /app/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy

  # --- 3. FRONTEND ---
  web:
    build:
      context: ./frontend
    container_name: school_schedule_web
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=/api
      - VITE_PROXY_TARGET=http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
